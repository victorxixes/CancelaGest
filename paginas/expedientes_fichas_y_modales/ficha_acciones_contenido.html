<div class="content">

    <h2>Seleccionar Acción</h2>

    <button class="btn-select" style="margin-bottom:15px;" onclick="abrirModalNuevaAccion()">
        ➕ Añadir acción
    </button>

    <input type="text" id="buscador" placeholder="Buscar acción por ID o descripción...">

    <table class="glass-table">
        <thead>
            <tr>
                <th style="width:80px;">ID</th>
                <th>Descripción</th>
                <th style="width:120px;">Seleccionar</th>
            </tr>
        </thead>
        <tbody id="tablaAcciones"></tbody>
    </table>

</div>
