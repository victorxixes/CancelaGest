/* ---------------------------
   SISTEMA DE MODALES
----------------------------*/
function abrirModal(id) {
    document.getElementById(id).style.display = "flex";
}

function cerrarModal(id) {
    document.getElementById(id).style.display = "none";
}

function abrirModalNuevaAccion() {
    abrirModal("modalNuevaAccion");
}
function editarAccion(id) {
    const accion = acciones.find(a => a.id == id);
    if (!accion) return;

    // Rellenar modal de edición
    document.getElementById("accion_id").value = accion.id;
    document.getElementById("accion_desc").value = accion.desc;

    // Abrir modal
    abrirModal("modalNuevaAccion");

    // Cambiar botón Guardar → Actualizar
    const btn = document.querySelector("#modalNuevaAccion .modal-actions button:last-child");
    btn.textContent = "Actualizar";
    btn.onclick = function () { actualizarAccion(id); };
}

/* ---------------------------
   GUARDAR NUEVA ACCIÓN
----------------------------*/
function guardarNuevaAccion() {
    const id = document.getElementById("accion_id").value.trim();
    const desc = document.getElementById("accion_desc").value.trim();

    if (!id || !desc) {
        alert("Debes rellenar ID y Descripción.");
        return;
    }

    const tbody = document.getElementById("tablaAcciones");
    const tr = document.createElement("tr");

    tr.innerHTML = `
        <td>${id}</td>
        <td>${desc}</td>
<td>
    <button class="btn-select"
        onclick="seleccionarAccion('${acc.id}', '${acc.desc.replace(/'/g, "\\'")}')">
        Seleccionar
    </button>

    <button class="btn-select btn-edit"
        onclick="editarAccion('${acc.id}')">
        ✏ Editar
    </button>

    <button class="btn-select btn-delete"
        onclick="eliminarAccion('${acc.id}')">
        🗑 Eliminar
    </button>
</td>

    `;

    tbody.appendChild(tr);

    cerrarModal("modalNuevaAccion");
}
function actualizarAccion(idOriginal) {
    const id = document.getElementById("accion_id").value.trim();
    const desc = document.getElementById("accion_desc").value.trim();

    if (!id || !desc) {
        alert("Debes rellenar ID y Descripción.");
        return;
    }

    const accion = acciones.find(a => a.id == idOriginal);
    if (!accion) return;

    accion.id = id;
    accion.desc = desc;

    renderTabla(acciones);
    cerrarModal("modalNuevaAccion");

    // Restaurar botón Guardar
    const btn = document.querySelector("#modalNuevaAccion .modal-actions button:last-child");
    btn.textContent = "Guardar";
    btn.onclick = guardarNuevaAccion;
}

/* ---------------------------
   SELECCIONAR ACCIÓN
----------------------------*/
function seleccionarAccion(id, descripcion) {
    alert("Has seleccionado: " + id + " - " + descripcion);
}

/* ---------------------------
   RENDERIZAR TABLA + BUSCADOR
----------------------------*/
function renderTabla(lista) {
    const tbody = document.getElementById("tablaAcciones");
    tbody.innerHTML = "";

    lista.forEach(acc => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${acc.id}</td>
            <td>${acc.desc}</td>
            <td>
                <button class="btn-select"
                    onclick="seleccionarAccion('${acc.id}', '${acc.desc.replace(/'/g, "\\'")}')">
                    Seleccionar
                </button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}

document.addEventListener("DOMContentLoaded", () => {
    if (typeof acciones !== "undefined") {
        renderTabla(acciones);

        const buscador = document.getElementById("buscador");

        buscador.addEventListener("input", function () {
            const texto = this.value.toLowerCase();

            const filtradas = acciones.filter(a =>
                a.desc.toLowerCase().includes(texto) ||
                a.id.toString().includes(texto)
            );

            renderTabla(filtradas);
        });
    }
});
