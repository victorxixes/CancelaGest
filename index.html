<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Acceso · CancelaGest 2.0</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

    <style>
        :root {
            --mol-primary: #084482;
            --mol-primary-light: #0A5BB5;
            --mol-primary-dark: #052C52;

            --glass-white: rgba(255,255,255,0.55);
            --glass-border: rgba(255,255,255,0.35);
        }

        /* ============================================================
           FONDO GLASS LUXE
        ============================================================ */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;

            background:
                repeating-linear-gradient(
                    90deg,
                    rgba(255,255,255,0.08) 0px,
                    rgba(255,255,255,0.08) 2px,
                    transparent 2px,
                    transparent 14px
                ),
                linear-gradient(180deg,
                    rgba(255,255,255,0.65),
                    rgba(255,255,255,0.45)
                );
            backdrop-filter: blur(18px);
        }

        body.dark {
            background:
                repeating-linear-gradient(
                    90deg,
                    rgba(255,255,255,0.05) 0px,
                    rgba(255,255,255,0.05) 2px,
                    transparent 2px,
                    transparent 14px
                ),
                linear-gradient(180deg,
                    rgba(11,21,34,0.75),
                    rgba(11,21,34,0.55)
                );
        }

        /* ============================================================
           TARJETA LOGIN GLASS LUXE
        ============================================================ */
        .login-card {
            width: 420px;
            padding: 40px 34px;
            border-radius: 18px;
            background: rgba(255,255,255,0.55);
            border: 1px solid var(--glass-border);
            box-shadow: 0 12px 40px rgba(10,74,138,0.25);
            backdrop-filter: blur(18px);
            animation: fadeIn 0.8s ease;
        }

        body.dark .login-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 12px 40px rgba(0,0,0,0.45);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LOGO */
        .logo-molsan {
            width: 160px;
            display: block;
            margin: 0 auto 20px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.15));
        }

        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 6px;
            font-weight: 700;
            color: var(--mol-primary);
        }

        body.dark h1 {
            color: #fff;
        }

        p.subtitle {
            text-align: center;
            font-size: 14px;
            color: #475569;
            margin-bottom: 20px;
        }

        body.dark p.subtitle {
            color: #cbd5e1;
        }

        /* ============================================================
           INPUTS GLASS LUXE
        ============================================================ */
        .campo {
            margin-bottom: 18px;
        }

        .campo label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
            color: var(--mol-primary-dark);
        }

        body.dark .campo label {
            color: #e5e7eb;
        }

        .campo input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(10px);
            font-size: 15px;
            transition: 0.25s ease;
            box-shadow: 0 4px 12px rgba(10,74,138,0.15);
        }

        body.dark .campo input {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .campo input:focus {
            outline: none;
            border-color: var(--mol-primary);
            box-shadow: 0 0 0 3px rgba(8,68,130,0.25);
        }

        /* ============================================================
           BOTÓN GLASS LUXE
        ============================================================ */
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--mol-primary);
            color: white;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 6px 18px rgba(10,74,138,0.25);
        }

        .btn:hover {
            background: var(--mol-primary-light);
            transform: translateY(-2px);
        }

        /* FOOTER */
        .footer {
            margin-top: 22px;
            text-align: center;
            font-size: 12px;
            color: #64748b;
        }

        body.dark .footer {
            color: #9ca3af;
        }

        /* ============================================================
           TOGGLE DARK MODE
        ============================================================ */
        .toggle-theme {
            position: absolute;
            top: 22px;
            right: 22px;
            width: 40px;
            height: 20px;
            border-radius: 999px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.45);
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-thumb {
            width: 16px;
            height: 16px;
            background: var(--mol-primary);
            border-radius: 999px;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s ease;
        }

        body.dark .toggle-thumb {
            transform: translateX(20px);
            background: #fff;
        }
    </style>
</head>

<body>

<div class="toggle-theme" onclick="toggleTheme()">
    <div class="toggle-thumb"></div>
</div>

<div class="login-card">

    <img class="logo-molsan" src="img/logo.jpg" alt="Logo Molsan">

    <h1>CancelaGest 2.0</h1>
    <p class="subtitle">Bienvenido</p>
    <p class="subtitle">Identifícate para continuar</p>

    <div class="campo">
        <label>Usuario</label>
        <input type="text" placeholder="Introduce tu usuario">
    </div>

    <div class="campo">
        <label>Contraseña</label>
        <input type="password" placeholder="Introduce tu contraseña">
    </div>

    <button class="btn" onclick="login()">Entrar</button>

    <div class="footer">
        © 2026 Molsan Gestión y Tramitación · Todos los derechos reservados
    </div>

</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");
}

function login() {
    window.location.href = "paginas/panel/panel.html";
}
</script>

</body>
</html>
